<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xkatsura | Temp Mail</title>
  <link rel="stylesheet" href="styles.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="tempmail-panel" id="tempmail-panel">
    <div class="tm-header">
      <a href="../" class="tm-close-btn" id="tm-close-btn" aria-label="Back to Grid">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>BACK TO GRID</span>
      </a>
      <div class="tm-title">temp[mail]</div>
    </div>
    
    <div class="tm-content">
      <!-- Left Column: Generator & Controls -->
      <div class="tm-sidebar">
        <div class="tm-card tm-generator-card">
          <div class="tm-card-header">YOUR TEMPORARY ADDRESS</div>
          <div class="tm-address-container">
            <span class="tm-address" id="tm-address">loading...</span>
            <button class="tm-icon-btn copy-btn" id="tm-copy-btn" title="Copy to clipboard">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
          </div>
          <div class="tm-actions">
            <button class="tm-btn" id="tm-generate-btn">GENERATE NEW</button>
          </div>
        </div>
        
        <div class="tm-status">
          <div class="tm-status-indicator" id="tm-refresh-progress"></div>
          <div class="tm-status-text">Auto-refreshing in <span id="tm-countdown">10</span>s</div>
        </div>
      </div>
      
      <!-- Right Column: Inbox & Details -->
      <div class="tm-main">
        <div class="tm-inbox" id="tm-inbox-view">
          <div class="tm-inbox-header">
            <span>INBOX</span>
            <span class="tm-badge" id="tm-inbox-count">0</span>
          </div>
          <div class="tm-message-list" id="tm-message-list">
            <!-- Empty state -->
            <div class="tm-empty-state" id="tm-empty-state">
              <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect>
                <polyline points="3 7 12 13 21 7"></polyline>
              </svg>
              <p>WAITING FOR INCOMING EMAILS...</p>
            </div>
          </div>
        </div>
        
        <div class="tm-detail" id="tm-detail-view" style="display: none;">
          <div class="tm-detail-header">
            <button class="tm-back-to-inbox" id="tm-back-to-inbox">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
              BACK TO INBOX
            </button>
          </div>
          <div class="tm-message-meta">
            <div class="tm-meta-row">
              <span class="tm-meta-label">FROM:</span>
              <span class="tm-meta-value" id="tm-detail-sender"></span>
            </div>
            <div class="tm-meta-row">
              <span class="tm-meta-label">SUBJECT:</span>
              <span class="tm-meta-value" id="tm-detail-subject"></span>
            </div>
            <div class="tm-meta-row">
              <span class="tm-meta-label">DATE:</span>
              <span class="tm-meta-value" id="tm-detail-date"></span>
            </div>
          </div>
          <div class="tm-message-body" id="tm-detail-body">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
